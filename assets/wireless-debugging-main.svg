<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1300" viewBox="0 0 900 1300" role="img" aria-labelledby="title desc">
  <title id="title">Wireless debugging main screen value map</title>
  <desc id="desc">A sanitized Android Wireless debugging screen showing where to find the connect IP address and port.</desc>
  <rect width="900" height="1300" fill="#050505"/>
  <text x="72" y="120" fill="#f8fafc" font-family="Arial, sans-serif" font-size="62">Wireless debugging</text>
  <rect x="48" y="174" width="804" height="132" rx="34" fill="#242424"/>
  <text x="86" y="230" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34">Wireless debugging</text>
  <text x="86" y="274" fill="#a5a5a5" font-family="Arial, sans-serif" font-size="26">Debug mode when Wi-Fi is connected</text>
  <rect x="710" y="206" width="108" height="62" rx="31" fill="#2f7df6"/>
  <circle cx="788" cy="237" r="26" fill="#ffffff"/>

  <rect x="48" y="338" width="804" height="278" rx="34" fill="#242424"/>
  <text x="86" y="400" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34">Device name</text>
  <text x="86" y="446" fill="#a5a5a5" font-family="Arial, sans-serif" font-size="28">Android phone</text>
  <text x="86" y="542" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34">IP address and port</text>
  <text x="86" y="590" fill="#a5a5a5" font-family="Arial, sans-serif" font-size="31">192.168.137.42:45678</text>

  <rect x="48" y="646" width="804" height="272" rx="34" fill="#242424"/>
  <text x="86" y="710" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34">Pair device with QR code</text>
  <text x="86" y="754" fill="#a5a5a5" font-family="Arial, sans-serif" font-size="26">Pair new devices using QR code scanner</text>
  <text x="86" y="858" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34">Pair device with pairing code</text>
  <text x="86" y="902" fill="#a5a5a5" font-family="Arial, sans-serif" font-size="26">Pair new devices using six-digit code</text>

  <text x="64" y="1010" fill="#9aa4ff" font-family="Arial, sans-serif" font-size="28">Paired devices</text>
  <rect x="48" y="1040" width="804" height="118" rx="34" fill="#242424"/>
  <text x="86" y="1112" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34">laptop@example</text>

  <path d="M530 586 C664 586 678 586 806 586" stroke="#ffcc33" stroke-width="6" fill="none"/>
  <polygon points="806,586 780,570 780,602" fill="#ffcc33"/>
  <rect x="452" y="470" width="380" height="86" rx="18" fill="#3b2f00" stroke="#ffcc33" stroke-width="3"/>
  <text x="474" y="505" fill="#fff7d6" font-family="Arial, sans-serif" font-size="24">CONNECT_IP:CONNECT_PORT</text>
  <text x="474" y="538" fill="#fff7d6" font-family="Arial, sans-serif" font-size="20">Use this with adb connect</text>

  <rect x="72" y="1210" width="756" height="54" rx="12" fill="#111827"/>
  <text x="94" y="1246" fill="#dbeafe" font-family="Arial, sans-serif" font-size="22">If this line shows only an IP and no :port, the connect listener is not active yet.</text>
</svg>
